# Thin shim by design (ring 0002): all check logic lives in .seed/ so the CI provider
# is swappable in one file.
name: seed-ci
on:
  push:
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # the git-aware gates diff against the event's base commit
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node .seed/checks/run-all.ts
      - run: node .seed/tests/self-test.ts
      - run: node .seed/checks/ring-append-only.ts ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || github.event.before }}
      - run: node .seed/checks/plan-traceability.ts ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || github.event.before }}
      - run: node .seed/checks/fitness.ts
